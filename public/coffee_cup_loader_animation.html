<style>
  .loader-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 340px;
    background: #000;
    border-radius: 16px;
    padding: 2rem;
  }

  .stage-label {
    color: #888;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 1rem;
    font-family: monospace;
  }

  .progress-bar {
    width: 200px;
    height: 3px;
    background: #222;
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: #b03a2e;
    border-radius: 2px;
    transition: width 0.1s linear;
  }

  .tap-hint {
    color: #444;
    font-size: 11px;
    margin-top: 12px;
    font-family: monospace;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 1.2rem;
  }

  .ctrl-btn {
    background: transparent;
    border: 0.5px solid #444;
    color: #aaa;
    padding: 6px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: monospace;
  }

  .ctrl-btn:hover {
    border-color: #888;
    color: #fff;
  }
</style>

<div class="loader-wrap" id="wrap">
  <canvas id="c" width="220" height="220" style="display:block;"></canvas>
  <div class="stage-label" id="stageLbl">Step 1: Base forming</div>
  <div class="progress-bar">
    <div class="progress-fill" id="prog" style="width:0%"></div>
  </div>
  <div class="tap-hint" id="hint">● loading</div>
  <div class="btn-row">
    <button class="ctrl-btn" onclick="restart()">↺ Restart</button>
    <button class="ctrl-btn" onclick="togglePause()">⏸ Pause</button>
  </div>
</div>

<script>
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  const W = 220, H = 220;

  const RED = '#b03a2e', DARK_RED = '#8b2c21', CREAM = '#f0ead6', WHITE = '#f5f2ec', SHADOW = '#1a0a08';

  let t = 0, paused = false, phase = 0;
  const TOTAL = 14000;
  const PHASES = [
    { label: 'Step 1: Base forming', start: 0, end: 0.25 },
    { label: 'Step 2: Coloring & logo', start: 0.25, end: 0.5 },
    { label: 'Step 3: Takeaway cup ready', start: 0.5, end: 0.75 },
    { label: 'Step 4: Final composition', start: 0.75, end: 1 },
  ];

  function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function remap(v, a, b, c, d) { return lerp(c, d, clamp((v - a) / (b - a), 0, 1)); }

  function drawCupOutline(x, y, w, h, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = WHITE;
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    // Body trapezoid
    const tw = w * 0.55, bw = w * 0.7;
    ctx.beginPath();
    ctx.moveTo(x - tw / 2, y);
    ctx.lineTo(x - bw / 2, y + h);
    ctx.lineTo(x + bw / 2, y + h);
    ctx.lineTo(x + tw / 2, y);
    ctx.closePath();
    ctx.stroke();
    // Bottom oval
    ctx.beginPath();
    ctx.ellipse(x, y + h, bw / 2, 6, 0, 0, Math.PI * 2);
    ctx.stroke();
    // Straw
    ctx.beginPath();
    ctx.moveTo(x + tw / 4, y);
    ctx.lineTo(x + tw / 4 - 8, y - 28);
    ctx.stroke();
    ctx.restore();
  }

  function drawTakeawayCup(x, y, scale, colorAlpha, outlineAlpha) {
    ctx.save();
    ctx.globalAlpha = 1;
    const s = scale;
    const cw = 68 * s, ch = 80 * s, lh = 18 * s, bh = 12 * s;
    const cx = x, cy = y;

    // Shadow
    if (colorAlpha > 0.3) {
      ctx.globalAlpha = colorAlpha * 0.3;
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(cx, cy + ch + lh + 2 * s, cw * 0.42, 7 * s, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Lid
    ctx.globalAlpha = colorAlpha;
    ctx.fillStyle = RED;
    ctx.beginPath();
    ctx.moveTo(cx - cw * 0.38, cy + lh * 0.9);
    ctx.lineTo(cx - cw * 0.48, cy + lh);
    ctx.lineTo(cx + cw * 0.48, cy + lh);
    ctx.lineTo(cx + cw * 0.38, cy + lh * 0.9);
    ctx.closePath();
    ctx.fill();
    // Lid top curve
    ctx.beginPath();
    ctx.ellipse(cx, cy + lh * 0.3, cw * 0.38, lh * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    // Lid connector bump
    ctx.beginPath();
    ctx.roundRect(cx - 10 * s, cy + lh * 0.6, 20 * s, lh * 0.4, 4 * s);
    ctx.fill();

    // Cup body
    ctx.globalAlpha = colorAlpha;
    const tw2 = cw * 0.52, bw2 = cw * 0.72;
    const ty = cy + lh, by = cy + lh + ch;
    // White bottom section
    ctx.fillStyle = WHITE;
    const whH = ch * 0.22;
    ctx.beginPath();
    ctx.moveTo(cx - lerp(tw2, bw2, 0.78) / 2, ty + ch * 0.78);
    ctx.lineTo(cx - bw2 / 2, by);
    ctx.lineTo(cx + bw2 / 2, by);
    ctx.lineTo(cx + lerp(tw2, bw2, 0.78) / 2, ty + ch * 0.78);
    ctx.closePath();
    ctx.fill();

    // Red body
    ctx.fillStyle = RED;
    ctx.beginPath();
    ctx.moveTo(cx - tw2 / 2, ty);
    ctx.lineTo(cx - lerp(tw2, bw2, 0.78) / 2, ty + ch * 0.78);
    ctx.lineTo(cx + lerp(tw2, bw2, 0.78) / 2, ty + ch * 0.78);
    ctx.lineTo(cx + tw2 / 2, ty);
    ctx.closePath();
    ctx.fill();

    // Dark band divider
    ctx.fillStyle = DARK_RED;
    ctx.beginPath();
    ctx.moveTo(cx - lerp(tw2, bw2, 0.2) / 2, ty + ch * 0.18);
    ctx.lineTo(cx - lerp(tw2, bw2, 0.24) / 2, ty + ch * 0.24);
    ctx.lineTo(cx + lerp(tw2, bw2, 0.24) / 2, ty + ch * 0.24);
    ctx.lineTo(cx + lerp(tw2, bw2, 0.2) / 2, ty + ch * 0.18);
    ctx.closePath();
    ctx.fill();

    // Bottom white band
    ctx.fillStyle = WHITE;
    ctx.beginPath();
    ctx.moveTo(cx - bw2 / 2, by - bh);
    ctx.lineTo(cx - bw2 / 2, by);
    ctx.lineTo(cx + bw2 / 2, by);
    ctx.lineTo(cx + bw2 / 2, by - bh);
    ctx.closePath();
    ctx.fill();

    // Coffee bean logo
    if (colorAlpha > 0.2) {
      ctx.globalAlpha = colorAlpha;
      const bx = cx, bear_y = ty + ch * 0.46;
      const br = 11 * s;
      ctx.fillStyle = WHITE;
      ctx.beginPath();
      ctx.ellipse(bx, bear_y, br, br * 1.3, 0, 0, Math.PI * 2);
      ctx.fill();
      // Bean crease
      ctx.strokeStyle = RED;
      ctx.lineWidth = 1.5 * s;
      ctx.beginPath();
      ctx.moveTo(bx, bear_y - br * 0.9);
      ctx.bezierCurveTo(bx + br * 0.5, bear_y, bx + br * 0.5, bear_y, bx, bear_y + br * 0.9);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(bx, bear_y - br * 0.9);
      ctx.bezierCurveTo(bx - br * 0.5, bear_y, bx - br * 0.5, bear_y, bx, bear_y + br * 0.9);
      ctx.stroke();
    }

    // Outline overlay
    if (outlineAlpha > 0) {
      ctx.globalAlpha = outlineAlpha * colorAlpha;
      ctx.strokeStyle = '#fff3';
      ctx.lineWidth = 1 * s;
      ctx.beginPath();
      ctx.moveTo(cx - tw2 / 2, ty);
      ctx.lineTo(cx - bw2 / 2, by);
      ctx.lineTo(cx + bw2 / 2, by);
      ctx.lineTo(cx + tw2 / 2, ty);
      ctx.closePath();
      ctx.stroke();
    }

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawEspressoCup(x, y, scale, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    const s = scale;
    const cw = 36 * s, ch = 28 * s;

    // Saucer
    ctx.fillStyle = WHITE;
    ctx.beginPath();
    ctx.ellipse(x, y + ch + 5 * s, cw * 0.8, 5 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ddd9cc';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // Cup body
    ctx.fillStyle = WHITE;
    ctx.beginPath();
    ctx.moveTo(x - cw * 0.4, y);
    ctx.lineTo(x - cw * 0.5, y + ch);
    ctx.lineTo(x + cw * 0.5, y + ch);
    ctx.lineTo(x + cw * 0.4, y);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#ddd9cc';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // Handle
    ctx.strokeStyle = '#ddd9cc';
    ctx.lineWidth = 2 * s;
    ctx.beginPath();
    ctx.arc(x + cw * 0.55, y + ch * 0.5, 7 * s, -Math.PI * 0.5, Math.PI * 0.5);
    ctx.stroke();

    // Coffee inside
    ctx.fillStyle = '#5c3317';
    ctx.globalAlpha = alpha * 0.7;
    ctx.beginPath();
    ctx.ellipse(x, y + 4 * s, cw * 0.35, 5 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawGlow(x, y, r, alpha) {
    ctx.save();
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, `rgba(176,58,46,${alpha * 0.18})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(x, y, r, r * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function render(progress) {
    ctx.clearRect(0, 0, W, H);
    const p = progress;
    const cx = W / 2, cy = H / 2;

    // PHASE 1: 0 - 0.25 → outline cup draws in
    if (p <= 0.25) {
      const pp = remap(p, 0, 0.25, 0, 1);
      const ease = easeInOut(pp);
      drawCupOutline(cx, 55, 90, 95, ease);
    }

    // PHASE 2: 0.25 - 0.5 → color fills in, logo appears
    else if (p <= 0.5) {
      const pp = remap(p, 0.25, 0.5, 0, 1);
      const ease = easeInOut(pp);
      const outlineAlpha = lerp(1, 0, ease);
      const colorAlpha = ease;
      drawTakeawayCup(cx, 30, 1.15, colorAlpha, outlineAlpha);
    }

    // PHASE 3: 0.5 - 0.75 → espresso cup appears beside
    else if (p <= 0.75) {
      const pp = remap(p, 0.5, 0.75, 0, 1);
      const ease = easeInOut(pp);
      const mainX = lerp(cx, cx - 18, ease);
      drawTakeawayCup(mainX, 30, 1.15, 1, 0);
      // espresso outline phase
      const espAlpha = ease;
      const espX = lerp(cx + 50, cx + 52, ease);
      drawEspressoCup(espX, 105, lerp(0.3, 0.9, ease), espAlpha * 0.5);
    }

    // PHASE 4: 0.75 - 1.0 → final composition + glow
    else {
      const pp = remap(p, 0.75, 1.0, 0, 1);
      const ease = easeInOut(pp);
      const glowA = lerp(0, 0.9, ease);
      drawGlow(cx - 18, 160, 90, glowA);
      drawTakeawayCup(cx - 18, 30, 1.15, 1, 0);
      drawEspressoCup(cx + 52, 105, 0.9, ease);
      // Stable glow pulse for last phase
      if (p > 0.92) {
        const pulse = (Math.sin(t * 0.003) + 1) * 0.5;
        drawGlow(cx - 18, 160, 100, 0.05 + pulse * 0.08);
      }
    }

    // Update label + progress
    let phIdx = PHASES.findIndex(ph => p <= ph.end);
    if (phIdx < 0) phIdx = 3;
    document.getElementById('stageLbl').textContent = PHASES[phIdx].label;
    document.getElementById('prog').style.width = (p * 100).toFixed(1) + '%';

    const isStable = p >= 1;
    document.getElementById('hint').textContent = isStable ? '✦ load complete' : '● loading';
  }

  let lastTs = null;
  function loop(ts) {
    if (!lastTs) lastTs = ts;
    if (!paused) {
      const dt = ts - lastTs;
      t += dt;
      const raw = Math.min(t / TOTAL, 1);
      render(raw);
      if (raw < 1) requestAnimationFrame(loop);
      else {
        // Stable loop
        requestAnimationFrame(stableLoop);
      }
    } else {
      requestAnimationFrame(loop);
    }
    lastTs = ts;
  }

  let stableT = 0, stableLastTs = null;
  function stableLoop(ts) {
    if (!stableLastTs) stableLastTs = ts;
    if (!paused) {
      stableT += ts - stableLastTs;
      t = TOTAL + stableT;
      render(1);
    }
    stableLastTs = ts;
    requestAnimationFrame(stableLoop);
  }

  function restart() {
    t = 0; lastTs = null; stableT = 0; stableLastTs = null; paused = false;
    document.getElementById('toggleBtn') && (document.getElementById('toggleBtn').textContent = '⏸ Pause');
    requestAnimationFrame(loop);
  }

  function togglePause() {
    paused = !paused;
    const btn = document.querySelectorAll('.ctrl-btn')[1];
    btn.textContent = paused ? '▶ Resume' : '⏸ Pause';
  }

  requestAnimationFrame(loop);
</script>
